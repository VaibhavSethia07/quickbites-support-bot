# Copy .env.example to .env and set secrets. Compose reads .env for ${VAR} substitution.
services:
  api:
    platform: linux/amd64
    build: .
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in .env or the environment}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      SIMULATOR_BASE_URL: ${SIMULATOR_BASE_URL:-https://simulator-75lk3meynq-el.a.run.app}
      CANDIDATE_TOKEN: ${CANDIDATE_TOKEN:-}
      HOST: 0.0.0.0
      PORT: "8000"
      # Use image-baked seed DB at repo root (same as local default in Settings).
      DATABASE_PATH: app.db
    restart: unless-stopped
